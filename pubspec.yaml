name: lectura
description: Cititor local de documente cu naratiune offline si voce neurala expresiva.
publish_to: "none"
version: 1.0.0+10

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  archive: ^4.0.9
  audio_service: ^0.18.19
  audio_session: ^0.2.4
  crypto: ^3.0.6
  file_picker: ^11.0.2
  flutter_secure_storage: ^10.3.1
  flutter_tts: ^4.2.5
  google_mlkit_text_recognition: ^0.16.0
  html: ^0.15.6
  http: ^1.6.0
  just_audio: ^0.10.6
  just_audio_background: ^0.0.1-beta.17
  image: ^4.9.1
  path: ^1.9.1
  path_provider: ^2.1.6
  pdfrx: ^2.4.7
  supertonic_flutter: ^2.0.0
  xml: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
